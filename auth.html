<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Вход · Flum Tik</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/main.css">
    <style>
        .auth-page {
            min-height: 100vh;
            background: linear-gradient(135deg, #000, #1a1a1a);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .auth-card {
            background: #111;
            border-radius: 30px;
            padding: 40px 30px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        
        .auth-logo {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .auth-logo i {
            font-size: 64px;
            color: #ff3b5c;
            margin-bottom: 10px;
        }
        
        .auth-logo h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #ff3b5c, #ff8c5a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .auth-avatar-preview {
            display: flex;
            justify-content: center;
            margin: 20px 0;
        }
        
        .auth-avatar-preview img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #ff3b5c;
        }
        
        .auth-field {
            margin-bottom: 20px;
        }
        
        .auth-field label {
            display: block;
            font-size: 12px;
            color: #888;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .auth-field input {
            width: 100%;
            background: #222;
            border: 1px solid #333;
            border-radius: 16px;
            padding: 16px 18px;
            color: white;
            font-size: 16px;
        }
        
        .auth-field input:focus {
            outline: none;
            border-color: #ff3b5c;
        }
        
        .auth-upload-area {
            background: #222;
            border: 2px dashed #444;
            border-radius: 16px;
            padding: 24px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .auth-upload-area:hover {
            border-color: #ff3b5c;
            background: #2a2a2a;
        }
        
        .auth-upload-area i {
            font-size: 32px;
            color: #888;
            margin-bottom: 8px;
        }
        
        .auth-buttons {
            display: flex;
            gap: 12px;
            margin-top: 30px;
        }
        
        .auth-btn {
            flex: 1;
            padding: 16px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }
        
        .auth-btn.login-btn {
            background: #ff3b5c;
            color: white;
        }
        
        .auth-btn.login-btn:active {
            transform: scale(0.98);
            background: #e02e4a;
        }
        
        .auth-btn.register-btn {
            background: #333;
            color: white;
        }
        
        .auth-btn.register-btn:active {
            background: #444;
        }
        
        .auth-back {
            text-align: center;
            margin-top: 20px;
        }
        
        .auth-back a {
            color: #888;
            text-decoration: none;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="auth-page">
        <div class="auth-card">
            <div class="auth-logo">
                <i class="fa-solid fa-film"></i>
                <h1>Flum Tik</h1>
            </div>

            <div class="auth-avatar-preview">
                <img src="https://i.pravatar.cc/150?u=default" id="previewImg">
            </div>

            <div class="auth-field">
                <label>Имя пользователя</label>
                <input type="text" id="authUsername" placeholder="например: flum_user" maxlength="30">
            </div>

            <div class="auth-field">
                <label>Аватар (необязательно)</label>
                <div class="auth-upload-area" id="authUploadArea">
                    <i class="fa-solid fa-cloud-upload-alt"></i>
                    <div>Нажмите чтобы выбрать фото</div>
                </div>
                <input type="file" id="authAvatarFile" accept="image/*" hidden>
            </div>

            <div class="auth-buttons">
                <button class="auth-btn login-btn" id="loginBtn">Войти</button>
                <button class="auth-btn register-btn" id="registerBtn">Регистрация</button>
            </div>

            <div class="auth-back">
                <a href="feed.html">← Вернуться на главную</a>
            </div>
        </div>
    </div>

    <script>
        window.FLUM_CONFIG = {
            firebaseUrl: 'https://flum-2-default-rtdb.firebaseio.com/',
            yyfUrl: 'https://yyf.mubilop.com'
        };
    </script>
    <script src="js/firebase.js"></script>
    <script src="js/yet-integration.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const usernameInput = document.getElementById('authUsername');
            const previewImg = document.getElementById('previewImg');
            const avatarFile = document.getElementById('authAvatarFile');
            const uploadArea = document.getElementById('authUploadArea');

            // Предпросмотр аватара
            uploadArea.addEventListener('click', () => {
                avatarFile.click();
            });

            avatarFile.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        previewImg.src = e.target.result;
                    };
                    reader.readAsDataURL(file);
                }
            });

            // Вход
            document.getElementById('loginBtn').addEventListener('click', async () => {
                const username = usernameInput.value.trim();
                if (!username) {
                    alert('Введите имя пользователя');
                    return;
                }

                try {
                    await window.auth.login(username);
                    window.location.href = 'feed.html';
                } catch (error) {
                    alert(error.message);
                }
            });

            // Регистрация
            document.getElementById('registerBtn').addEventListener('click', async () => {
                const username = usernameInput.value.trim();
                if (!username) {
                    alert('Введите имя пользователя');
                    return;
                }

                try {
                    const file = avatarFile.files[0];
                    await window.auth.register(username, file);
                    window.location.href = 'feed.html';
                } catch (error) {
                    alert(error.message);
                }
            });
        });
    </script>
</body>
</html>
