<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Профиль · Flum Tik</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/profile.css">
</head>
<body>
    <div class="tiktok-app">
        <!-- Шапка с кнопкой назад -->
        <div class="header" style="justify-content: flex-start; gap: 20px;">
            <i class="fa-solid fa-arrow-left" onclick="history.back()" style="font-size: 22px;"></i>
            <span style="font-weight: 600;">Профиль</span>
        </div>

        <!-- Контент профиля -->
        <div class="pages-container">
            <div class="page active">
                <div id="profileContent"></div>
            </div>
        </div>

        <!-- Нижняя навигация -->
        <div class="bottom-nav">
            <div class="nav-item" onclick="window.location.href='feed.html'">
                <i class="fa-solid fa-house"></i>
                <span class="label">Главная</span>
            </div>
            <div class="nav-item" onclick="window.location.href='discover.html'">
                <i class="fa-solid fa-compass"></i>
                <span class="label">Открыть</span>
            </div>
            <div class="nav-item plus-button" onclick="window.location.href='upload.html'">
                <i class="fa-solid fa-plus"></i>
            </div>
            <div class="nav-item" onclick="window.location.href='inbox.html'">
                <i class="fa-regular fa-envelope"></i>
                <span class="label">Входящие</span>
            </div>
            <div class="nav-item active" onclick="window.location.href='profile.html'">
                <i class="fa-regular fa-user"></i>
                <span class="label">Я</span>
            </div>
        </div>
    </div>

    <script>
        window.FLUM_CONFIG = {
            firebaseUrl: 'https://flum-2-default-rtdb.firebaseio.com/',
            yyfUrl: 'https://yyf.mubilop.com'
        };
    </script>
    <script src="js/firebase.js"></script>
    <script src="js/yet-integration.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/profile.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Получаем ID пользователя из URL (например ?userId=123)
            const urlParams = new URLSearchParams(window.location.search);
            const userId = urlParams.get('userId');
            
            window.profile.load({ userId: userId });
        });
    </script>
</body>
</html>
