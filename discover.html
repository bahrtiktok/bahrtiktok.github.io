<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Уведомления · Flum Tik</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/main.css">
    <style>
        .inbox-container {
            padding: 20px;
            color: white;
        }
        
        .notification-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px 0;
            border-bottom: 1px solid #222;
        }
        
        .notification-icon {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        
        .notification-icon.like { background: #ff3b5c; }
        .notification-icon.comment { background: #3897f0; }
        .notification-icon.follow { background: #4caf50; }
        
        .notification-content {
            flex: 1;
        }
        
        .notification-text {
            font-size: 14px;
            margin-bottom: 4px;
        }
        
        .notification-time {
            font-size: 11px;
            color: #888;
        }
        
        .notification-empty {
            text-align: center;
            padding: 60px 20px;
            color: #888;
        }
        
        .notification-empty i {
            font-size: 64px;
            margin-bottom: 20px;
            opacity: 0.3;
        }
    </style>
</head>
<body>
    <div class="tiktok-app">
        <!-- Шапка -->
        <div class="header">
            <div class="header-left">
                <span class="tab" onclick="window.location.href='feed.html'">Главная</span>
                <span class="tab" onclick="window.location.href='discover.html'">Друзья</span>
            </div>
            <div class="header-right">
                <i class="fa-solid fa-magnifying-glass" onclick="window.location.href='search.html'"></i>
                <i class="fa-regular fa-circle-check active" onclick="window.location.href='inbox.html'"></i>
            </div>
        </div>

        <!-- Контент -->
        <div class="pages-container">
            <div class="page active">
                <div class="inbox-container">
                    <h2 style="margin-bottom: 20px;">Уведомления</h2>
                    
                    <div id="notificationsList">
                        <!-- Сюда будут загружаться уведомления -->
                    </div>
                </div>
            </div>
        </div>

        <!-- Нижняя навигация -->
        <div class="bottom-nav">
            <div class="nav-item" onclick="window.location.href='feed.html'">
                <i class="fa-solid fa-house"></i>
                <span class="label">Главная</span>
            </div>
            <div class="nav-item" onclick="window.location.href='discover.html'">
                <i class="fa-solid fa-compass"></i>
                <span class="label">Открыть</span>
            </div>
            <div class="nav-item plus-button" onclick="window.location.href='upload.html'">
                <i class="fa-solid fa-plus"></i>
            </div>
            <div class="nav-item active" onclick="window.location.href='inbox.html'">
                <i class="fa-regular fa-envelope"></i>
                <span class="label">Входящие</span>
            </div>
            <div class="nav-item" onclick="window.location.href='profile.html'">
                <i class="fa-regular fa-user"></i>
                <span class="label">Я</span>
            </div>
        </div>
    </div>

    <script>
        window.FLUM_CONFIG = {
            firebaseUrl: 'https://flum-2-default-rtdb.firebaseio.com/',
            yyfUrl: 'https://yyf.mubilop.com'
        };
    </script>
    <script src="js/firebase.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const list = document.getElementById('notificationsList');
            
            // Проверяем авторизацию
            if (!window.auth.isAuthenticated) {
                list.innerHTML = `
                    <div class="notification-empty">
                        <i class="fa-regular fa-bell"></i>
                        <h3>Нет уведомлений</h3>
                        <p>Войдите, чтобы видеть свои уведомления</p>
                        <button class="profile-empty-btn" onclick="window.auth.showAuthModal()">
                            Войти
                        </button>
                    </div>
                `;
                return;
            }

            // Для демо показываем заглушку
            list.innerHTML = `
                <div class="notification-empty">
                    <i class="fa-regular fa-bell"></i>
                    <h3>Пока нет уведомлений</h3>
                    <p>Здесь будут появляться лайки, комментарии и новые подписчики</p>
                </div>
            `;

            // TODO: загружать реальные уведомления из Firebase
        });
    </script>
</body>
</html>
