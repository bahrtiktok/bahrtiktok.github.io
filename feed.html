<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Лента · Flum Tik</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/feed.css">
</head>
<body>
    <div class="tiktok-app">
        <!-- Шапка -->
        <div class="header">
            <div class="header-left">
                <span class="tab active" onclick="window.location.href='feed.html'">Главная</span>
                <span class="tab" onclick="window.location.href='discover.html'">Друзья</span>
            </div>
            <div class="header-right">
                <i class="fa-solid fa-magnifying-glass" onclick="window.location.href='search.html'"></i>
                <i class="fa-regular fa-circle-check" onclick="window.location.href='inbox.html'"></i>
            </div>
        </div>

        <!-- Лента -->
        <div class="pages-container">
            <div class="page active" id="page-feed">
                <div class="feed-container" id="feedContainer"></div>
            </div>
        </div>

        <!-- Нижняя навигация -->
        <div class="bottom-nav">
            <div class="nav-item active" onclick="window.location.href='feed.html'">
                <i class="fa-solid fa-house"></i>
                <span class="label">Главная</span>
            </div>
            <div class="nav-item" onclick="window.location.href='discover.html'">
                <i class="fa-solid fa-compass"></i>
                <span class="label">Открыть</span>
            </div>
            <div class="nav-item plus-button" onclick="window.location.href='upload.html'">
                <i class="fa-solid fa-plus"></i>
            </div>
            <div class="nav-item" onclick="window.location.href='inbox.html'">
                <i class="fa-regular fa-envelope"></i>
                <span class="label">Входящие</span>
            </div>
            <div class="nav-item" onclick="window.location.href='profile.html'">
                <i class="fa-regular fa-user"></i>
                <span class="label">Я</span>
            </div>
        </div>
    </div>

    <!-- Модалка комментариев -->
    <div class="comment-modal" id="commentModal">
        <div class="comment-sheet">
            <div class="comment-header">
                <h3>Комментарии (<span id="commentCountSpan">0</span>)</h3>
                <span class="close-comments" id="closeComments">&times;</span>
            </div>
            <div class="comment-list" id="commentList"></div>
            <div class="comment-input-area">
                <input type="text" class="comment-input" placeholder="Написать комментарий..." id="commentInput">
                <button class="comment-send" id="sendComment">Отправить</button>
            </div>
        </div>
    </div>

    <script>
        window.FLUM_CONFIG = {
            firebaseUrl: 'https://flum-2-default-rtdb.firebaseio.com/',
            yyfUrl: 'https://yyf.mubilop.com'
        };
    </script>
    <script src="js/firebase.js"></script>
    <script src="js/yet-integration.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/comments.js"></script>
    <script src="js/feed.js"></script>
    <script>
        // Загружаем ленту при загрузке страницы
        document.addEventListener('DOMContentLoaded', () => {
            window.feed.load();
        });
    </script>
</body>
</html>
