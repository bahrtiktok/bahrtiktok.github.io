<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Загрузка · Flum Tik</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/upload.css">
</head>
<body>
    <div class="tiktok-app">
        <!-- Шапка с кнопкой назад -->
        <div class="header" style="justify-content: flex-start; gap: 20px;">
            <i class="fa-solid fa-arrow-left" onclick="history.back()" style="font-size: 22px;"></i>
            <span style="font-weight: 600;">Загрузить видео</span>
        </div>

        <!-- Страница загрузки -->
        <div class="pages-container">
            <div class="page active" id="page-upload"></div>
        </div>

        <!-- Нижняя навигация (скрыта на странице загрузки) -->
        <div class="bottom-nav" style="display: none;"></div>
    </div>

    <script>
        window.FLUM_CONFIG = {
            firebaseUrl: 'https://flum-2-default-rtdb.firebaseio.com/',
            yyfUrl: 'https://yyf.mubilop.com'
        };
    </script>
    <script src="js/firebase.js"></script>
    <script src="js/yet-integration.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/upload.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Проверяем авторизацию
            if (!window.auth.isAuthenticated) {
                window.auth.showAuthModal().then(() => {
                    window.upload.load();
                }).catch(() => {
                    window.location.href = 'feed.html';
                });
            } else {
                window.upload.load();
            }
        });
    </script>
</body>
</html>
